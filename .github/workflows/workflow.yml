name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # FRONTEND
  frontend-check:
    name: Build Frontend (React)
    runs-on: ubuntu-latest

    # Specify the working directory
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      # Check for syntax/linting errors
      - name: Run Linter
        run: npm run lint

      # Ensure Vite compiles the project
      - name: Build Frontend
        run: npm run build

  # BACKEND
  backend-check:
    name: Build Backend (Spring Boot)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    # This spins up a temporary database just for the GitHub runner
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: msframework
          POSTGRES_USER: msframework
          POSTGRES_PASSWORD: msframework
        ports:
          - 5433:5432
        # Tells GitHub to wait until Postgres is actually ready before starting the Java tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven Wrapper Executable
        run: chmod +x ./mvnw

      # This compiles the code and runs the default Spring Boot context test
      - name: Compile and Test Backend
        run: ./mvnw clean verify